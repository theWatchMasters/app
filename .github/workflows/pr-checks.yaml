name: Pull Request CI
on:
  pull_request:
    branches:
      - master
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn
      - run: corepack enable
      - run: corepack yarn install --immutable --immutable-cache --check-cache
      - run: corepack yarn format:ci
      - run: corepack yarn lint
      - run: corepack yarn expo prebuild
