name: Pull Request CI
on:
    pull_request:
        branches:
            - master
jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - name: Use Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: yarn
            - run: corepack enable
            - run: yarn install --immutable --immutable-cache --check-cache
            - run: yarn format:ci
            - run: yarn lint
            - run: yarn expo prebuild
